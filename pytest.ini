[pytest]
# Register the repository root to automatically resolve the 'src', 'app', and 'utils' packages
pythonpath = .

# Specify directories to search for tests to optimize discovery speed
testpaths = tests

# Standard options for a clean, verbose developer test output
addopts = -v --tb=short --strict-markers

# Filter warnings from heavy dependencies like PyTorch, scikit-learn, and pandas to keep outputs clean
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
